<svg width="350" height="170" viewBox="0 0 350 170" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="350" y2="170" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#090D15" />
      <stop offset="1" stop-color="#140914" />
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="1.4" flood-color="#00CFFF" flood-opacity="0.25" />
    </filter>
    <clipPath id="progressClip">
      <rect x="25" y="55" width="300" height="8" rx="5" />
