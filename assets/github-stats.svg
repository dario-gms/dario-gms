<svg width="350" height="170" viewBox="0 0 350 170" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="350" y2="170" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0D0D0D" />
      <stop offset="1" stop-color="#140914" />
    </linearGradient>
    <filter id="titleGlow" x="-20%" y="-50%" width="150%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="1.8" flood-color="#00CFFF" flood-opacity="0.45" />
    </filter>
  </defs>

  <rect x="0.5" y="0.5" width="349" height="169" rx="8" fill="url(#bgGradient)" stroke="#1A0010">
    <animate attributeName="stroke-opacity" values="0.6;1;0.6" dur="2.2s" repeatCount="indefinite" />
  </rect>

  <text x="18" y="26" font-family="'Share Tech Mono', 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#FF003C" filter="url(#titleGlow)">
    Dario's GitHub Stats
  </text>

  
  <g transform="translate(18, 46)">
    <circle cx="0" cy="-4" r="2.4" fill="#FF6633">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.2s" begin="0.25s" repeatCount="indefinite" />
    </circle>
    <text x="9" y="0" font-family="'Share Tech Mono', 'Segoe UI', sans-serif" font-size="12.5" fill="#00CFFF">Total Stars:</text>
    <text x="166" y="0" font-family="'Share Tech Mono', 'Segoe UI', sans-serif" font-size="12.5" fill="#00CFFF">127</text>
  </g>

  <g transform="translate(18, 68)">
    <circle cx="0" cy="-4" r="2.4" fill="#FF6633">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.2s" begin="0.35s" repeatCount="indefinite" />
    </circle>
    <text x="9" y="0" font-family="'Share Tech Mono', 'Segoe UI', sans-serif" font-size="12.5" fill="#00CFFF">Total Commits (2026):</text>
    <text x="166" y="0" font-family="'Share Tech Mono', 'Segoe UI', sans-serif" font-size="12.5" fill="#00CFFF">1.2k</text>
  </g>

  <g transform="translate(18, 90)">
    <circle cx="0" cy="-4" r="2.4" fill="#FF6633">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.2s" begin="0.45s" repeatCount="indefinite" />
    </circle>
    <text x="9" y="0" font-family="'Share Tech Mono', 'Segoe UI', sans-serif" font-size="12.5" fill="#00CFFF">Total PRs:</text>
    <text x="166" y="0" font-family="'Share Tech Mono', 'Segoe UI', sans-serif" font-size="12.5" fill="#00CFFF">152</text>
  </g>

  <g transform="translate(18, 112)">
    <circle cx="0" cy="-4" r="2.4" fill="#FF6633">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.2s" begin="0.55s" repeatCount="indefinite" />
    </circle>
    <text x="9" y="0" font-family="'Share Tech Mono', 'Segoe UI', sans-serif" font-size="12.5" fill="#00CFFF">Followers:</text>
    <text x="166" y="0" font-family="'Share Tech Mono', 'Segoe UI', sans-serif" font-size="12.5" fill="#00CFFF">454</text>
  </g>

  <g transform="translate(18, 134)">
    <circle cx="0" cy="-4" r="2.4" fill="#FF6633">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.2s" begin="0.65s" repeatCount="indefinite" />
    </circle>
    <text x="9" y="0" font-family="'Share Tech Mono', 'Segoe UI', sans-serif" font-size="12.5" fill="#00CFFF">Repositories:</text>
    <text x="166" y="0" font-family="'Share Tech Mono', 'Segoe UI', sans-serif" font-size="12.5" fill="#00CFFF">31</text>
  </g>


  <g transform="translate(296, 86)">
    <path id="rankOrbit" d="M 0 -32 A 32 32 0 1 1 0 32 A 32 32 0 1 1 0 -32" fill="none" />
    <circle cx="0" cy="0" r="32" fill="none" stroke="#350015" stroke-width="6" />
    <circle cx="0" cy="0" r="32" fill="none" stroke="#FF003C" stroke-width="6"
      stroke-linecap="round" transform="rotate(-90)" stroke-dasharray="0 201.06">
      <animate attributeName="stroke-dasharray" from="0 201.06" to="201.06 201.06" dur="1.05s" begin="0.32s" fill="freeze" />
      <animate attributeName="stroke-width" values="6;7.6;6" dur="1.6s" repeatCount="indefinite" />
    </circle>
    <circle r="2.6" fill="#FF003C">
      <animateMotion dur="3.1s" repeatCount="indefinite" rotate="auto">
        <mpath href="#rankOrbit" />
      </animateMotion>
      <animate attributeName="opacity" values="0.45;1;0.45" dur="1.1s" repeatCount="indefinite" />
    </circle>
    <text x="0" y="7" text-anchor="middle" font-family="'Share Tech Mono', 'Segoe UI', sans-serif" font-size="23" font-weight="700" fill="#00CFFF">S-
      <animate attributeName="fill-opacity" values="0.85;1;0.85" dur="1.45s" repeatCount="indefinite" />
    </text>
  </g>

  <text x="296" y="137" text-anchor="middle" font-family="'Share Tech Mono', 'Segoe UI', sans-serif" font-size="11" fill="#FF003C">RANK</text>
  <text x="338" y="162" text-anchor="end" font-family="'Share Tech Mono', 'Segoe UI', sans-serif" font-size="9" fill="#5CA1B8">dario-gms</text>
</svg>
