  </defs>

  <rect x="0.5" y="0.5" width="349" height="169" rx="6" fill="url(#bgGradient)" stroke="#1A0010" />

  <text x="25" y="35" font-family="'Share Tech Mono', 'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#FF315A">
    Top Languages by Repo
  </text>

  <rect x="25" y="55" width="300" height="8" rx="5" fill="#0A0F18" />

  <g clip-path="url(#progressClip)" filter="url(#softGlow)">
    <rect x="25" y="55" width="257.63" height="8" fill="#00E5FF" />
    <rect x="282.63" y="55" width="17.32" height="8" fill="#FF6B35" />
    <rect x="299.95" y="55" width="11.34" height="8" fill="#FF315A" />
    <rect x="311.29" y="55" width="7.07" height="8" fill="#2F6BFF" />
    <rect x="318.36" y="55" width="6.64" height="8" fill="#FFB347" />
  </g>

  <g font-family="'Share Tech Mono', 'Segoe UI', sans-serif" font-size="11" fill="#00CFFF">
